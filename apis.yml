aid: zeebe
name: Zeebe
description: >-
  Zeebe is the cloud-native workflow engine that powers Camunda 8, providing scalable, resilient workflow automation and
  microservices orchestration without relying on a central database, enabling high throughput with horizontal scaling.
  It implements BPMN 2.0 process execution and provides a REST API for process deployment, instance management, job
  handling, message correlation, and cluster topology queries.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
