apis:
  - aid: zeebe:zeebe
    name: Zeebe REST API
    description: >-
      The Zeebe REST API provides programmatic access to the Zeebe workflow engine powering Camunda 8. It enables
      process deployment, process instance creation and management, job activation and completion, message and signal
      publishing, incident resolution, user task management, and cluster topology queries.
    humanURL: https://docs.camunda.io/docs/apis-tools/zeebe-api-rest/zeebe-api-rest-overview/
    baseURL: https://{region}.zeebe.camunda.io:443/{clusterId}/v2
