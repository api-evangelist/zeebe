      - name: throwerror
        method: POST
        description: Zeebe Throw Error for a Job
        inputParameters:
        - name: jobKey
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-jobkey-retries
      path: /jobs/{jobKey}/retries
      operations:
      - name: updatejobretries
        method: PATCH
        description: Zeebe Update Job Retries
        inputParameters:
        - name: jobKey
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
