naftiko: 1.0.0-alpha2
info:
  label: Zeebe REST API
  description: The Zeebe REST API provides endpoints for interacting with the Zeebe workflow engine that powers Camunda 8,
    including process deployment, instance management, job handling, and cluster topology queries.
  tags:
  - Zeebe
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: zeebe
    baseUri: http://localhost:8080/v2
    description: Zeebe REST API HTTP API.
    authentication:
      type: bearer
      token: '{{ZEEBE_TOKEN}}'
    resources:
    - name: topology
      path: /topology
      operations:
      - name: gettopology
        method: GET
        description: Zeebe Get Cluster Topology
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments
      path: /deployments
      operations:
      - name: deployresources
        method: POST
        description: Zeebe Deploy Resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: process-instances
      path: /process-instances
      operations:
      - name: createprocessinstance
        method: POST
        description: Zeebe Create a Process Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
