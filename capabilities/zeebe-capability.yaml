        method: POST
        description: Zeebe Resolve an Incident
        inputParameters:
        - name: incidentKey
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resources-deletion
      path: /resources/deletion
      operations:
      - name: deleteresource
        method: POST
        description: Zeebe Delete a Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
