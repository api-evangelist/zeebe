naftiko: 1.0.0-alpha2
info:
  label: Zeebe REST API — Deployments
  description: 'Zeebe REST API — Deployments. 1 operations. Lead operation: Zeebe Deploy Resources. Self-contained Naftiko
    capability covering one Zeebe business surface.'
  tags:
  - Zeebe
  - Deployments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZEEBE_API_KEY: ZEEBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: zeebe-deployments
    baseUri: ''
    description: Zeebe REST API — Deployments business capability. Self-contained, no shared references.
    resources:
    - name: deployments
      path: /deployments
      operations:
      - name: deployresources
        method: POST
        description: Zeebe Deploy Resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZEEBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: zeebe-deployments-rest
    port: 8080
    description: REST adapter for Zeebe REST API — Deployments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/deployments
      name: deployments
      description: REST surface for deployments.
      operations:
      - method: POST
        name: deployresources
        description: Zeebe Deploy Resources
        call: zeebe-deployments.deployresources
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zeebe-deployments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zeebe REST API — Deployments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zeebe-deploy-resources
      description: Zeebe Deploy Resources
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zeebe-deployments.deployresources
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
