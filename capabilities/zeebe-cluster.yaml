naftiko: 1.0.0-alpha2
info:
  label: Zeebe REST API — Cluster
  description: 'Zeebe REST API — Cluster. 1 operations. Lead operation: Zeebe Get Cluster Topology. Self-contained Naftiko
    capability covering one Zeebe business surface.'
  tags:
  - Zeebe
  - Cluster
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZEEBE_API_KEY: ZEEBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: zeebe-cluster
    baseUri: ''
    description: Zeebe REST API — Cluster business capability. Self-contained, no shared references.
    resources:
    - name: topology
      path: /topology
      operations:
      - name: gettopology
        method: GET
        description: Zeebe Get Cluster Topology
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ZEEBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: zeebe-cluster-rest
    port: 8080
    description: REST adapter for Zeebe REST API — Cluster. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/topology
      name: topology
      description: REST surface for topology.
      operations:
      - method: GET
        name: gettopology
        description: Zeebe Get Cluster Topology
        call: zeebe-cluster.gettopology
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zeebe-cluster-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zeebe REST API — Cluster. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zeebe-get-cluster-topology
      description: Zeebe Get Cluster Topology
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zeebe-cluster.gettopology
      outputParameters:
      - type: object
        mapping: $.
