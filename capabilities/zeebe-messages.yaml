naftiko: 1.0.0-alpha2
info:
  label: Zeebe REST API — Messages
  description: 'Zeebe REST API — Messages. 1 operations. Lead operation: Zeebe Publish a Message. Self-contained Naftiko capability
    covering one Zeebe business surface.'
  tags:
  - Zeebe
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZEEBE_API_KEY: ZEEBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: zeebe-messages
    baseUri: ''
    description: Zeebe REST API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages-publication
      path: /messages/publication
      operations:
      - name: publishmessage
        method: POST
        description: Zeebe Publish a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZEEBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: zeebe-messages-rest
    port: 8080
    description: REST adapter for Zeebe REST API — Messages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/messages/publication
      name: messages-publication
      description: REST surface for messages-publication.
      operations:
      - method: POST
        name: publishmessage
        description: Zeebe Publish a Message
        call: zeebe-messages.publishmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zeebe-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zeebe REST API — Messages. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zeebe-publish-message
      description: Zeebe Publish a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zeebe-messages.publishmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
