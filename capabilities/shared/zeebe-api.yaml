naftiko: 1.0.0-alpha1
info:
  label: Zeebe REST API
  description: The Zeebe REST API provides endpoints for interacting with the Zeebe workflow engine that powers Camunda 8, including process deployment, instance management, job handling, and cluster 
    topology queries.
  tags:
    - Zeebe
  created: '2026-05-03'
  modified: '2026-05-03'
capability:
  consumes:
    - type: http
      namespace: api
      baseUri: '{baseUrl}/v2'
      description: The Zeebe REST API provides endpoints for interacting with the Zeebe workflow engine that powers Camunda 8, including process deployment, instance management, job handling, and 
        cluster topology queries.
      resources:
        - name: api
          path: /
          description: The Zeebe REST API provides endpoints for interacting with the Zeebe workflow engine that powers Camunda 8, including process deployment, instance management, job handling, and 
            cluster topology queries.
          operations:
            - name: get-topology
              method: GET
              path: /topology
              description: Zeebe Get Cluster Topology
              inputParameters: []
              outputRawFormat: json
            - name: deploy-resources
              method: POST
              path: /deployments
              description: Zeebe Deploy Resources
              inputParameters: []
              outputRawFormat: json
            - name: create-process-instance
              method: POST
              path: /process-instances
              description: Zeebe Create a Process Instance
              inputParameters: []
              outputRawFormat: json
            - name: cancel-process-instance
              method: DELETE
              path: /process-instances/{processInstanceKey}
              description: Zeebe Cancel a Process Instance
              inputParameters:
                - name: processInstanceKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: migrate-process-instance
              method: POST
              path: /process-instances/{processInstanceKey}/migration
              description: Zeebe Migrate a Process Instance
              inputParameters:
                - name: processInstanceKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: activate-jobs
              method: POST
              path: /jobs/activation
              description: Zeebe Activate Jobs
              inputParameters: []
              outputRawFormat: json
            - name: complete-job
              method: POST
              path: /jobs/{jobKey}/completion
              description: Zeebe Complete a Job
              inputParameters:
                - name: jobKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: fail-job
              method: POST
              path: /jobs/{jobKey}/failure
              description: Zeebe Fail a Job
              inputParameters:
                - name: jobKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: throw-error
              method: POST
              path: /jobs/{jobKey}/error
              description: Zeebe Throw Error for a Job
              inputParameters:
                - name: jobKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: update-job-retries
              method: PATCH
              path: /jobs/{jobKey}/retries
              description: Zeebe Update Job Retries
              inputParameters:
                - name: jobKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: publish-message
              method: POST
              path: /messages/publication
              description: Zeebe Publish a Message
              inputParameters: []
              outputRawFormat: json
            - name: broadcast-signal
              method: POST
              path: /signals/broadcast
              description: Zeebe Broadcast a Signal
              inputParameters: []
              outputRawFormat: json
            - name: resolve-incident
              method: POST
              path: /incidents/{incidentKey}/resolution
              description: Zeebe Resolve an Incident
              inputParameters:
                - name: incidentKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: delete-resource
              method: POST
              path: /resources/deletion
              description: Zeebe Delete a Resource
              inputParameters: []
              outputRawFormat: json
            - name: assign-user-task
              method: POST
              path: /user-tasks/{userTaskKey}/assignment
              description: Zeebe Assign a User Task
              inputParameters:
                - name: userTaskKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
            - name: complete-user-task
              method: POST
              path: /user-tasks/{userTaskKey}/completion
              description: Zeebe Complete a User Task
              inputParameters:
                - name: userTaskKey
                  in: path
                  type: integer
                  required: true
                  description: ''
              outputRawFormat: json
      authentication:
        type: bearer
        token: '{{TOKEN}}'
